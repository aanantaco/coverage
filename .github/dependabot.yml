# Dependabot keeps the single Go dependency and the SHA-pinned GitHub Actions
# current. For Actions pinned to a commit SHA with a `# vX.Y.Z` comment,
# Dependabot bumps the SHA and updates the comment.
version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
