name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, test & self-report coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Install test tooling
        # Both tools are pinned for reproducibility. gocover-cobertura v1.5.0
        # requires Go >= 1.25, satisfied by the Go 1.26 toolchain above.
        run: |
          go install gotest.tools/gotestsum@v1.13.0
          go install github.com/boumenot/gocover-cobertura@v1.5.0

      # Produce Cobertura + JUnit artifacts for this module, using the same
      # workspace-id convention the tool consumes: coverage-<id>.xml / tests-<id>.xml.
      - name: Run tests with coverage
        run: |
          gotestsum --junitfile tests-coverage.xml --format pkgname \
            -- -coverprofile=coverage.out -covermode=atomic -count=1 ./...
          gocover-cobertura < coverage.out > coverage-coverage.xml

      # Dogfood: build the app and use it to render this repo's own coverage
      # into the run's Summary tab.
      - name: Build coverage
        run: go build -o "$RUNNER_TEMP/coverage" ./cmd/coverage

      - name: Coverage summary
        run: |
          mkdir -p ./coverage-artifacts
          mv coverage-coverage.xml tests-coverage.xml ./coverage-artifacts/
          "$RUNNER_TEMP/coverage" \
            --input ./coverage-artifacts \
            --ignore .coverageignore \
            --output "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Security
  # ==========================================================================
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy + render markdown report
        id: trivy
        run: |
          mkdir -p trivy-report
          set +e
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            aquasec/trivy:latest \
            filesystem \
            --exit-code 1 \
            --severity MEDIUM,HIGH,CRITICAL \
            --scanners vuln,secret,misconfig \
            --ignorefile .trivyignore \
            --skip-version-check \
            --format table \
            --output trivy-report/trivy-report.md \
            .
          trivy_exit=$?
          set -e
          {
            echo "## Trivy Security Scan"
            echo ""
            echo "Severities: MEDIUM, HIGH, CRITICAL — scanners: vuln, secret, misconfig"
            echo ""
            echo '```'
            cat trivy-report/trivy-report.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$trivy_exit"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report/
          if-no-files-found: warn
          retention-days: 30

  # ==========================================================================
  # Release
  # ==========================================================================
  # Runs only on version tags (e.g. v0.1.0), after build/test and the security
  # scan pass. GoReleaser cross-compiles the `coverage` binary and publishes a
  # GitHub Release with archives + checksums.
  release:
    name: Release (GoReleaser)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for the changelog

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
