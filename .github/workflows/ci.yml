name: CI

on:
  push:
    branches: [main]
    tags: ["v*"] # cut a version release (anchors the Marketplace listing)
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, test & self-report coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        # Go-symbol-aware scanning: only reports advisories whose vulnerable
        # symbols are actually reachable from this module.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

      - name: Build
        run: go build ./...

      - name: Install test tooling
        # Both tools are pinned for reproducibility. gocover-cobertura v1.5.0
        # requires Go >= 1.25, satisfied by the Go 1.26 toolchain above.
        run: |
          go install gotest.tools/gotestsum@v1.13.0
          go install github.com/boumenot/gocover-cobertura@v1.5.0

      # Produce Cobertura + JUnit artifacts for this module, using the same
      # workspace-id convention the tool consumes: coverage-<id>.xml / tests-<id>.xml.
      - name: Run tests with coverage
        run: |
          gotestsum --junitfile tests-coverage.xml --format pkgname \
            -- -coverprofile=coverage.out -covermode=atomic -count=1 ./...
          gocover-cobertura < coverage.out > coverage-coverage.xml

      # Dogfood: build the app and use it to render this repo's own coverage
      # into the run's Summary tab.
      - name: Build coverage
        run: go build -o "$RUNNER_TEMP/coverage" ./cmd/coverage

      - name: Coverage summary
        run: |
          mkdir -p ./coverage-artifacts
          mv coverage-coverage.xml tests-coverage.xml ./coverage-artifacts/
          "$RUNNER_TEMP/coverage" \
            --input ./coverage-artifacts \
            --ignore .coverageignore \
            --output "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Security
  # ==========================================================================
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run Trivy + render markdown report
        id: trivy
        run: |
          mkdir -p trivy-report
          set +e
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            aquasec/trivy:0.72.0@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            filesystem \
            --exit-code 1 \
            --severity MEDIUM,HIGH,CRITICAL \
            --scanners vuln,secret,misconfig \
            --ignorefile .trivyignore \
            --skip-version-check \
            --format table \
            --output trivy-report/trivy-report.md \
            .
          trivy_exit=$?
          set -e
          {
            echo "## Trivy Security Scan"
            echo ""
            echo "Severities: MEDIUM, HIGH, CRITICAL — scanners: vuln, secret, misconfig"
            echo ""
            echo '```'
            cat trivy-report/trivy-report.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$trivy_exit"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report
          path: trivy-report/
          if-no-files-found: warn
          retention-days: 30

  # ==========================================================================
  # Other lint (markdown & shell)
  # ==========================================================================
  lint:
    name: Lint (markdown & shell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Lint Markdown
        # Config + ignores are in .markdownlint-cli2.yaml. Node is preinstalled
        # on the runner.
        run: npx --yes markdownlint-cli2@0.18.1

      - name: Lint shell scripts
        # shellcheck is preinstalled on ubuntu runners. Lints tracked shell
        # scripts, if any.
        run: |
          files=$(git ls-files '*.sh' '*.bash')
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell scripts to lint."
          fi

  # ==========================================================================
  # Release binaries (per-commit)
  # ==========================================================================
  # Runs on every merge to main, after build/test and the security scan pass.
  # GoReleaser cross-compiles the `coverage` binary (snapshot mode, keyed to the
  # commit SHA), and the archives are published two ways: as a workflow artifact
  # (for this run) and as a per-commit GitHub prerelease tagged `sha-<shortsha>`
  # (a stable download the composite Action fetches instead of building from
  # source). No version tags — consumers still pin by commit SHA.
  release:
    name: Build release binaries
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the per-commit prerelease
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache: true

      - name: Build binaries (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-binaries-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error
          retention-days: 90

      - name: Publish per-commit prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short="${GITHUB_SHA:0:7}"
          tag="sha-${short}"
          notes="Per-commit build of \`coverage\` at \`${GITHUB_SHA}\`.

          Prebuilt binaries (linux/macOS/Windows × amd64/arm64) with \`checksums.txt\`.
          The composite Action downloads these when pinned by this commit SHA; you
          can also download them directly. Pin by commit SHA — this is a prerelease,
          not a stable version tag."
          # Idempotent: create the prerelease if absent, else replace its assets
          # (e.g. on a re-run of the same commit).
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz dist/*.zip dist/checksums.txt --clobber
          else
            gh release create "$tag" dist/*.tar.gz dist/*.zip dist/checksums.txt \
              --prerelease \
              --title "coverage @ ${short}" \
              --notes "$notes"
          fi

  # ==========================================================================
  # Version release (Marketplace anchor)
  # ==========================================================================
  # Runs when a `v*` tag is pushed. GoReleaser builds the same cross-platform
  # archives and publishes a normal (non-prerelease) GitHub Release for the tag,
  # with assets named coverage_<version>_<os>_<arch>. The composite Action
  # downloads these when pinned by the version tag (aanantaco/coverage@vX.Y.Z), so
  # Marketplace users get the prebuilt binary too — no Go toolchain. Day-to-day
  # pinning stays SHA-based; version tags exist only to anchor the listing.
  release-tag:
    name: Publish version release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache: true

      - name: Publish release (GoReleaser)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
