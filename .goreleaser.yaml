# GoReleaser configuration (https://goreleaser.com).
# Runs on version tags via .github/workflows/ci.yml. Validate locally with:
#   goreleaser check
#   goreleaser release --snapshot --clean   # dry run, no publish
version: 2

project_name: coverage

builds:
  - id: coverage
    main: ./cmd/coverage
    binary: coverage
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: coverage
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
