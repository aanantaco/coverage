# GoReleaser configuration (https://goreleaser.com).
# The CI workflow runs `goreleaser release --snapshot --clean` on each merge to
# main and uploads dist/ as a workflow artifact — no tags, no GitHub Release;
# archives are keyed to the commit SHA. Validate locally with:
#   goreleaser check
#   goreleaser release --snapshot --clean
version: 2

project_name: coverage

builds:
  - id: coverage
    main: ./cmd/coverage
    binary: coverage
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Stamp the version/commit into the binary so `coverage version` reports the
    # exact build. In snapshot mode .Version is "0.0.0-<shortcommit>" and
    # .FullCommit is the SHA consumers pin by.
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: coverage
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: checksums.txt

# No tags are cut, so snapshot builds key the version to the commit SHA. This
# flows into the archive name_template ({{ .Version }}). A fixed first-7 slice of
# the full commit (rather than git's variable-length abbreviation) keeps the
# archive name in lockstep with the `sha-<shortsha>` release tag and the short
# SHA the composite Action derives from its pinned ref.
snapshot:
  version_template: '0.0.0-{{ printf "%.7s" .FullCommit }}'
