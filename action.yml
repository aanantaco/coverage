# The Marketplace listing name must be globally unique; this descriptive name
# avoids collisions. It does not change how the Action is referenced
# (uses: aanantaco/coverage@<sha>).
name: Cobertura + JUnit Coverage Report
description: >-
  Aggregate Cobertura coverage and JUnit test-result artifacts from every
  project in a repo into a single Markdown (or HTML) report for the GitHub
  Actions run, with optional regression detection against a baseline.
author: aanantaco

branding:
  icon: bar-chart-2
  color: green

inputs:
  input:
    description: Directory containing coverage-*.xml and tests-*.xml artifacts.
    required: true
  output:
    description: >-
      Output path. Use "-" for stdout, or $GITHUB_STEP_SUMMARY (default) to
      write to the run's Summary tab.
    required: false
    default: $GITHUB_STEP_SUMMARY
  ignore:
    description: Path to a .coverageignore file (gitignore syntax). Optional.
    required: false
    default: ""
  config:
    description: Path to coverage.yaml. Defaults to ./coverage.yaml if present.
    required: false
    default: ""
  baseline:
    description: Path to a baseline coverage-summary.json for regression detection.
    required: false
    default: ""
  fail-on-drop:
    description: >-
      Fail the job if total line coverage drops by more than this many
      percentage points. Leave empty to only annotate.
    required: false
    default: ""
  emit-json:
    description: Also write a machine-readable coverage-summary.json to this path.
    required: false
    default: ""
  go-version:
    description: >-
      Go version for the fallback build (used only when a prebuilt binary can't
      be downloaded, e.g. a loose ref instead of a full commit SHA).
    required: false
    default: "1.26"

runs:
  using: composite
  steps:
    # When the Action is pinned by a full commit SHA (recommended) or a version
    # tag (vX.Y.Z, the usual Marketplace form), a matching release has a prebuilt
    # binary — download it, no Go toolchain required. For any other ref (a branch,
    # a moving tag) or if the download is unavailable, fall back to building from
    # this Action's own checked-out source. Either way the pin selects the exact
    # tool version.
    - name: Resolve coverage binary
      id: resolve
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        bin="${RUNNER_TEMP}/coverage"

        # Map the pinned ref to a published release and its archive version:
        #   full 40-hex SHA -> per-commit prerelease  sha-<short> / 0.0.0-<short>
        #   version tag vX.Y.Z -> version release      vX.Y.Z     / X.Y.Z
        ref="${ACTION_REF:-}"
        if [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]]; then
          tag="sha-${ref:0:7}"; ver="0.0.0-${ref:0:7}"
        elif [[ "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          tag="$ref"; ver="${ref#v}"
        else
          echo "Action ref '$ref' is not a commit SHA or vX.Y.Z tag; building from source." >&2
          echo "resolved=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        case "$RUNNER_OS" in
          Linux) os=linux; ext=tar.gz; binname=coverage ;;
          macOS) os=darwin; ext=tar.gz; binname=coverage ;;
          Windows) os=windows; ext=zip; binname=coverage.exe ;;
          *) echo "Unsupported RUNNER_OS='$RUNNER_OS'; building from source." >&2
             echo "resolved=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
        esac
        case "$RUNNER_ARCH" in
          X64) arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "Unsupported RUNNER_ARCH='$RUNNER_ARCH'; building from source." >&2
             echo "resolved=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
        esac

        asset="coverage_${ver}_${os}_${arch}.${ext}"
        base="https://github.com/aanantaco/coverage/releases/download/${tag}"
        tmp="$(mktemp -d)"

        if ! curl -fsSL -o "${tmp}/${asset}" "${base}/${asset}"; then
          echo "No prebuilt binary at ${base}/${asset}; building from source." >&2
          echo "resolved=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Verify the checksum when a checksum tool is available (best-effort on
        # the tool's presence, but a mismatch is always fatal).
        if curl -fsSL -o "${tmp}/checksums.txt" "${base}/checksums.txt"; then
          line="$(grep " ${asset}\$" "${tmp}/checksums.txt" || true)"
          if [ -n "$line" ]; then
            if command -v sha256sum >/dev/null 2>&1; then
              ( cd "$tmp" && printf '%s\n' "$line" | sha256sum -c - )
            elif command -v shasum >/dev/null 2>&1; then
              ( cd "$tmp" && printf '%s\n' "$line" | shasum -a 256 -c - )
            else
              echo "No checksum tool found; skipping verification." >&2
            fi
          fi
        fi

        if [ "$ext" = zip ]; then
          unzip -q -o "${tmp}/${asset}" -d "$tmp"
        else
          tar -xzf "${tmp}/${asset}" -C "$tmp"
        fi
        mv "${tmp}/${binname}" "$bin"
        chmod +x "$bin"
        echo "Using prebuilt coverage ${tag} (${os}/${arch})." >&2
        echo "resolved=true" >> "$GITHUB_OUTPUT"

    - name: Set up Go (fallback build)
      if: steps.resolve.outputs.resolved != 'true'
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    - name: Build coverage (fallback build)
      if: steps.resolve.outputs.resolved != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: go build -o "${RUNNER_TEMP}/coverage" ./cmd/coverage

    - name: Render coverage summary
      shell: bash
      run: |
        args=(--input "${{ inputs.input }}" --output "${{ inputs.output }}")
        [ -n "${{ inputs.ignore }}" ]       && args+=(--ignore "${{ inputs.ignore }}")
        [ -n "${{ inputs.config }}" ]       && args+=(--config "${{ inputs.config }}")
        [ -n "${{ inputs.baseline }}" ]     && args+=(--baseline "${{ inputs.baseline }}")
        [ -n "${{ inputs.fail-on-drop }}" ] && args+=(--fail-on-drop "${{ inputs.fail-on-drop }}")
        [ -n "${{ inputs.emit-json }}" ]    && args+=(--emit-json "${{ inputs.emit-json }}")
        "${RUNNER_TEMP}/coverage" "${args[@]}"
